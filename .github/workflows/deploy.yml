name: Deploy Full Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "Going to project folder"
            cd ${{ secrets.PROJECT_PATH }}

            echo "Resetting server repo to origin/main"
            git fetch origin main
            git reset --hard origin/main

            echo "Checking backend environment"
            test -f backend/.env || (echo "Missing backend/.env" && exit 1)
            test -f frontend/.env || (echo "Missing frontend/.env" && exit 1)

            echo "Setting up backend virtual environment"
            cd backend
            if [ -d ".venv" ]; then
              VENV_PATH=".venv"
            elif [ -d "venv" ]; then
              VENV_PATH="venv"
            else
              python3 -m venv .venv
              VENV_PATH=".venv"
            fi
            . "${VENV_PATH}/bin/activate"

            echo "Installing backend dependencies"
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "Running backend migrations"
            python manage.py migrate --noinput

            echo "Collecting static files"
            python manage.py collectstatic --noinput

            echo "Running Django system checks"
            python manage.py check

            echo "Building frontend"
            cd ../frontend
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build

            echo "Restarting application services"
            sudo systemctl restart ${{ secrets.GUNICORN_SERVICE }}
            sudo systemctl restart ${{ secrets.NGINX_SERVICE }}

            echo "Verifying service status"
            sudo systemctl is-active ${{ secrets.GUNICORN_SERVICE }}
            sudo systemctl is-active ${{ secrets.NGINX_SERVICE }}

            echo "Deployment completed successfully"
